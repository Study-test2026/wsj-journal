<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>WSJ The Journal · 한글 동시자막</title>
<link rel="stylesheet" href="./style.css" />
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <span class="logo">📻</span>
    <div>
      <h1>The Journal · WSJ</h1>
      <p id="ep-title">로딩 중…</p>
    </div>
  </div>
  <div class="support">
    <a class="btn coffee" href="https://buymeacoffee.com/ykstudy2020" target="_blank" rel="noopener">☕ Buy me a coffee · $1</a>
    <a class="btn robinhood" href="https://join.robinhood.com/jiaek-60876545" target="_blank" rel="noopener">🪶 Robinhood 친구 추천</a>
  </div>
</header>

<main>
  <section class="left">
    <div class="player-card">
      <audio id="audio" controls preload="metadata"></audio>
      <div class="player-controls">
        <label class="toggle"><input type="checkbox" id="skip-ads" checked /><span>광고 자동 스킵</span></label>
        <label class="toggle"><input type="checkbox" id="show-en" checked /><span>영문 표시</span></label>
        <select id="speed">
          <option value="0.8">0.8×</option>
          <option value="1" selected>1.0×</option>
          <option value="1.25">1.25×</option>
          <option value="1.5">1.5×</option>
          <option value="2">2.0×</option>
        </select>
        <span id="ad-notice" class="ad-notice"></span>
      </div>
    </div>
    <div class="tabs">
      <button class="tab active" data-tab="transcript">📝 자막</button>
      <button class="tab" data-tab="summary">📌 요약</button>
      <button class="tab" data-tab="episodes">🎙 최근 10화</button>
    </div>
    <div class="tab-panel" id="tab-transcript"><div id="transcript-list"></div></div>
    <div class="tab-panel hidden" id="tab-summary"><article id="summary-content"></article></div>
    <div class="tab-panel hidden" id="tab-episodes"><div id="episode-list"></div></div>
  </section>

  <aside class="right">
    <div class="stock-card">
      <div class="stock-head">
        <div>
          <h2 id="stock-symbol">—</h2>
          <p id="stock-name">자막의 종목 태그를 클릭하세요</p>
        </div>
        <div class="stock-price">
          <span id="stock-last">—</span>
          <span id="stock-chg" class="chg">—</span>
        </div>
      </div>
      <div id="chart" class="chart"></div>
      <div class="ai-card">
        <div class="ai-head">
          <span class="ai-badge">Claude · AI 분석</span>
          <span id="ai-rating" class="rating neutral">—</span>
        </div>
        <p id="ai-opinion">자막에서 종목을 클릭하면 1년 차트와 함께 AI의 매수/매도/중립 의견이 표시됩니다.</p>
        <p class="disclaimer">⚠ 본 의견은 정보 제공용이며 투자 권유가 아닙니다.</p>
      </div>
    </div>
  </aside>
</main>

<footer class="footer">
  <p>이 프로젝트가 도움 됐다면 ☕ <a href="https://buymeacoffee.com/ykstudy2020" target="_blank">$1 후원</a> 또는 <a href="https://join.robinhood.com/jiaek-60876545" target="_blank">Robinhood 가입</a>으로 응원해 주세요.</p>
  <p class="legal">© WSJ The Journal · 비공식 한글 학습용 · 오디오 저작권 © Dow Jones</p>
</footer>

<script src="./player.js" type="module"></script>
</body>
</html>
