<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Journal">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<title>The Journal · Daily</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--ink:#0a0a0f;--paper:#f5f0e8;--gold:#c9a84c;--muted:#8a8070;--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--paper);overflow-x:hidden}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .6s}
#loading.hidden{opacity:0;pointer-events:none}
.loading-logo{font-family:'Playfair Display',serif;font-size:13px;letter-spacing:6px;color:var(--gold);text-transform:uppercase;margin-bottom:32px}
.loading-bar{width:120px;height:1px;background:rgba(201,168,76,.2);position:relative;overflow:hidden}
.loading-bar::after{content:'';position:absolute;left:-100%;top:0;width:100%;height:100%;background:var(--gold);animation:lb 1.4s ease infinite}
@keyframes lb{to{left:100%}}

/* HEADER */
header{padding:calc(var(--safe-top) + 14px) 20px 14px;background:var(--ink);border-bottom:1px solid rgba(201,168,76,.2);position:sticky;top:0;z-index:50}
.header-inner{display:flex;align-items:center;justify-content:space-between}
.header-logo{font-family:'Playfair Display',serif;font-size:11px;letter-spacing:5px;color:var(--gold);text-transform:uppercase}
.header-date{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)}

/* TABS */
.tabs{display:flex;background:var(--ink);border-bottom:1px solid rgba(255,255,255,.06);padding:0 20px;overflow-x:auto;scrollbar-width:none;position:sticky;top:48px;z-index:49}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:11px 16px;font-size:12px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'DM Sans',sans-serif}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

main{min-height:calc(100dvh - 96px)}
.tab-panel{display:none}
.tab-panel.active{display:block}

/* EPISODE HERO */
.episode-hero{padding:24px 20px 18px;background:linear-gradient(180deg,rgba(201,168,76,.06) 0%,transparent 100%);border-bottom:1px solid rgba(255,255,255,.06)}
.episode-date{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:8px}
.episode-title{font-family:'Playfair Display',serif;font-size:21px;font-weight:700;line-height:1.3;color:var(--paper);margin-bottom:12px}
.episode-meta{display:flex;gap:14px;font-size:12px;color:var(--muted)}

/* PLAYER */
.player-wrap{margin:16px 20px;background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.2);border-radius:16px;padding:18px}
.player-controls{display:flex;align-items:center;gap:14px;margin-bottom:14px}
.play-btn{width:50px;height:50px;border-radius:50%;background:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 20px rgba(201,168,76,.3)}
.play-btn:active{transform:scale(.94)}
.play-icon{width:20px;height:20px;fill:var(--ink)}
.player-info{flex:1;min-width:0}
.player-time{font-family:'DM Mono',monospace;font-size:13px;color:var(--paper);margin-bottom:4px}
.speed-btn{background:rgba(255,255,255,.08);border:none;color:var(--paper);font-family:'DM Mono',monospace;font-size:11px;padding:4px 10px;border-radius:20px;cursor:pointer}
.progress-wrap{position:relative;cursor:pointer;padding:8px 0}
.progress-bg{height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--gold);border-radius:2px;width:0%;transition:width .25s linear}
.progress-thumb{position:absolute;top:50%;width:12px;height:12px;background:var(--gold);border-radius:50%;transform:translate(-50%,-50%);left:0%;transition:left .25s linear;box-shadow:0 0 8px rgba(201,168,76,.6)}

/* SUBTITLES */
.subtitle-container{padding:0 20px 24px}
.subtitle-header{display:flex;align-items:center;justify-content:space-between;padding:14px 0 10px}
.subtitle-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}
.lang-toggle{display:flex;gap:4px}
.lang-btn{padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:none;color:var(--muted);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif}
.lang-btn.active{background:var(--gold);border-color:var(--gold);color:var(--ink);font-weight:600}
.subtitle-list{display:flex;flex-direction:column;gap:2px}
.subtitle-item{padding:13px 15px;border-radius:10px;cursor:pointer;border-left:3px solid transparent;transition:background .15s}
.subtitle-item.active-line{background:rgba(201,168,76,.12);border-left-color:var(--gold)}
.subtitle-item:not(.active-line):nth-child(even){background:rgba(255,255,255,.02)}
.sub-en{font-size:15px;line-height:1.6;color:var(--paper);margin-bottom:5px}
.sub-ko{font-size:13px;line-height:1.6;color:rgba(245,240,232,.55);font-weight:300}
.subtitle-item.ko-only .sub-en{display:none}
.subtitle-item.ko-only .sub-ko{color:var(--paper);font-size:15px}
.subtitle-item.en-only .sub-ko{display:none}

/* SUMMARY */
.summary-wrap{padding:24px 20px}
.section-eyebrow{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.summary-text{font-size:15px;line-height:1.8;color:rgba(245,240,232,.85);font-weight:300;margin-bottom:24px}
.key-points{display:flex;flex-direction:column;gap:10px;margin-bottom:32px}
.key-point{display:flex;gap:12px;align-items:flex-start;padding:14px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid rgba(255,255,255,.06)}
.key-num{font-family:'Playfair Display',serif;font-size:18px;font-weight:700;color:var(--gold);opacity:.6;line-height:1;flex-shrink:0;min-width:20px}
.key-text{font-size:14px;line-height:1.6;color:var(--paper)}

/* STOCKS */
.stocks-wrap{padding:24px 20px}
.stocks-section-title{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.stocks-hint{font-size:10px;color:var(--muted);letter-spacing:1px}
.stock-list{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.stock-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:14px;overflow:hidden;cursor:pointer;transition:border-color .2s}
.stock-card:active{background:rgba(255,255,255,.05)}
.stock-card-top{display:flex;align-items:flex-start;gap:12px;padding:14px}
.stock-left{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0}
.stock-ticker{background:var(--gold);color:var(--ink);font-family:'DM Mono',monospace;font-size:12px;font-weight:500;padding:5px 10px;border-radius:7px;letter-spacing:1px;min-width:54px;text-align:center}
.stock-type-badge{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);background:rgba(255,255,255,.06);padding:2px 6px;border-radius:4px}
.stock-info{flex:1;min-width:0}
.stock-name{font-size:14px;font-weight:500;color:var(--paper);margin-bottom:3px}
.stock-reason{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:7px}
.stock-price-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.stock-price{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--paper)}
.stock-change{font-size:12px;font-weight:600}
.pos{color:#4ade80}.neg{color:#f87171}.neu{color:var(--muted)}
.stock-sentiment{font-size:11px;font-weight:600;margin-left:4px}
.sentiment-positive{color:#4ade80}.sentiment-neutral{color:var(--muted)}.sentiment-negative{color:#f87171}
.chart-area{padding:0 14px 14px;display:none}
.chart-area.open{display:block}
.chart-canvas-wrap{position:relative;height:150px}
.chart-loading{font-size:12px;color:var(--muted);text-align:center;padding:20px 0}
.chart-hint-label{font-size:10px;color:var(--muted);text-align:right;margin-top:4px;letter-spacing:1px}

.market-outlook{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:14px;padding:16px;margin-bottom:20px}
.outlook-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.outlook-text{font-size:14px;line-height:1.7;color:rgba(245,240,232,.8)}
.disclaimer{padding:14px 16px;background:rgba(255,255,255,.02);border-radius:10px;font-size:11px;color:var(--muted);line-height:1.6;border:1px solid rgba(255,255,255,.05);margin-bottom:40px}
.bottom-safe{height:calc(var(--safe-bottom) + 24px)}
</style>
</head>
<body>

<div id="loading">
  <div class="loading-logo">The Journal</div>
  <div class="loading-bar"></div>
</div>

<header>
  <div class="header-inner">
    <div class="header-logo">The Journal</div>
    <div class="header-date" id="headerDate">—</div>
  </div>
</header>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('listen',this)">🎧 듣기</button>
  <button class="tab-btn" onclick="switchTab('summary',this)">📋 요약</button>
  <button class="tab-btn" onclick="switchTab('stocks',this)">📈 관련주</button>
</div>

<main>
  <!-- LISTEN -->
  <div class="tab-panel active" id="tab-listen">
    <div class="episode-hero">
      <div class="episode-date" id="epDate">Loading…</div>
      <div class="episode-title" id="epTitle">에피소드 로딩 중…</div>
      <div class="episode-meta">
        <span id="epDuration">—</span>
        <span style="color:rgba(255,255,255,.2)">·</span>
        <span>WSJ The Journal</span>
      </div>
    </div>

    <div class="player-wrap">
      <audio id="audioEl" preload="none"></audio>
      <div class="player-controls">
        <button class="play-btn" onclick="togglePlay()">
          <svg class="play-icon" id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </button>
        <div class="player-info">
          <div class="player-time" id="timeDisplay">0:00 / 0:00</div>
          <button class="speed-btn" id="speedBtn" onclick="cycleSpeed()">1.0×</button>
        </div>
      </div>
      <div class="progress-wrap" id="progressWrap" onclick="seekAudio(event)">
        <div class="progress-bg"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-thumb" id="progressThumb"></div>
      </div>
    </div>

    <div class="subtitle-container">
      <div class="subtitle-header">
        <div class="subtitle-label">스크립트 <span id="adBadge" style="display:none;font-size:9px;background:rgba(248,113,113,.15);color:#f87171;padding:2px 6px;border-radius:4px;margin-left:6px;letter-spacing:1px">광고제거됨</span></div>
        <div class="lang-toggle">
          <button class="lang-btn active" id="btnBoth" onclick="setLang('both')">양방향</button>
          <button class="lang-btn" id="btnEn" onclick="setLang('en')">EN</button>
          <button class="lang-btn" id="btnKo" onclick="setLang('ko')">KO</button>
        </div>
      </div>
      <div class="subtitle-list" id="subtitleList">
        <div style="padding:40px;text-align:center;color:var(--muted);font-size:14px">로딩 중…</div>
      </div>
    </div>
  </div>

  <!-- SUMMARY -->
  <div class="tab-panel" id="tab-summary">
    <div class="summary-wrap">
      <div class="section-eyebrow">오늘의 에피소드 요약</div>
      <div class="summary-text" id="summaryText">로딩 중…</div>
      <div class="section-eyebrow" style="margin-bottom:12px">핵심 포인트</div>
      <div class="key-points" id="keyPoints"></div>
    </div>
  </div>

  <!-- STOCKS -->
  <div class="tab-panel" id="tab-stocks">
    <div class="stocks-wrap">
      <div class="stocks-section-title">
        <div class="section-eyebrow" style="margin-bottom:0">관련 주식</div>
        <div class="stocks-hint">탭하면 1년 차트</div>
      </div>
      <div class="stock-list" id="stockList"></div>

      <div class="stocks-section-title" style="margin-top:8px">
        <div class="section-eyebrow" style="margin-bottom:0">관련 ETF</div>
        <div class="stocks-hint">탭하면 1년 차트</div>
      </div>
      <div class="stock-list" id="etfList"></div>

      <div class="market-outlook" id="marketOutlook" style="display:none">
        <div class="outlook-label">시장 전망</div>
        <div class="outlook-text" id="outlookText"></div>
      </div>
      <div class="disclaimer">⚠️ 투자 정보는 참고용입니다. 모든 투자 결정은 본인의 판단과 책임 하에 이루어져야 합니다.</div>
    </div>
  </div>
</main>
<div class="bottom-safe"></div>

<script>
const DATA_URL = 'today.json';
let episodeData = null;
let langMode = 'both';
const speeds = [0.75,1.0,1.25,1.5,2.0];
let speedIdx = 1;
const chartInstances = {};
const priceCache = {};

// ── 데이터 로드 ──
async function loadData() {
  try {
    const res = await fetch(DATA_URL + '?t=' + Date.now());
    if (!res.ok) throw new Error();
    episodeData = await res.json();
  } catch {
    episodeData = getDemoData();
  }
  renderAll();
  setTimeout(() => document.getElementById('loading').classList.add('hidden'), 500);
}

function renderAll() {
  const ep = episodeData;
  const d = new Date();
  document.getElementById('headerDate').textContent = `${d.getMonth()+1}/${d.getDate()}`;
  document.getElementById('epDate').textContent = ep.published || '';
  document.getElementById('epTitle').textContent = ep.title || '';
  document.getElementById('epDuration').textContent = ep.duration || '';
  if (ep.audio_url) document.getElementById('audioEl').src = ep.audio_url;

  // 광고 제거 배지
  if (ep.ad_segments_removed > 0) {
    const badge = document.getElementById('adBadge');
    badge.style.display = 'inline';
    badge.textContent = `광고 ${ep.ad_segments_removed}구간 제거됨`;
  }

  renderSubtitles();
  renderSummary();
  renderStocks();
}

// ── 자막 ──
function renderSubtitles() {
  const subs = episodeData?.subtitles || [];
  const list = document.getElementById('subtitleList');
  if (!subs.length) {
    list.innerHTML = '<div style="padding:40px;text-align:center;color:var(--muted)">자막 없음</div>';
    return;
  }
  list.innerHTML = subs.map((s,i) => {
    let cls = 'subtitle-item';
    if (langMode==='ko') cls+=' ko-only';
    if (langMode==='en') cls+=' en-only';
    return `<div class="${cls}" id="sub-${i}" onclick="seekToSub(${i})">
      <div class="sub-en">${s.en||''}</div>
      <div class="sub-ko">${s.ko||''}</div>
    </div>`;
  }).join('');
}

// ── 요약 ──
function renderSummary() {
  document.getElementById('summaryText').textContent = episodeData?.analysis?.summary_ko || '요약 없음';
  document.getElementById('keyPoints').innerHTML = (episodeData?.analysis?.key_points||[]).map((p,i)=>
    `<div class="key-point"><div class="key-num">${i+1}</div><div class="key-text">${p}</div></div>`
  ).join('');
}

// ── 주식/ETF ──
function renderStocks() {
  const all = episodeData?.analysis?.related_stocks || [];
  const stocks = all.filter(s => s.type !== 'etf');
  const etfs   = all.filter(s => s.type === 'etf');

  document.getElementById('stockList').innerHTML = stocks.map((s,i) => stockCardHTML(s, 'stk', i)).join('') || '<div style="color:var(--muted);font-size:13px;padding:10px">관련 주식 없음</div>';
  document.getElementById('etfList').innerHTML   = etfs.map((s,i)   => stockCardHTML(s, 'etf', i)).join('') || '<div style="color:var(--muted);font-size:13px;padding:10px">관련 ETF 없음</div>';

  const lMap = {positive:'▲ 긍정',neutral:'— 중립',negative:'▼ 부정'};
  stocks.forEach((s,i) => fetchPrice(s.ticker, `stk-${i}`));
  etfs.forEach((s,i)   => fetchPrice(s.ticker, `etf-${i}`));

  if (episodeData?.analysis?.market_outlook) {
    document.getElementById('outlookText').textContent = episodeData.analysis.market_outlook;
    document.getElementById('marketOutlook').style.display = 'block';
  }
}

function stockCardHTML(s, prefix, i) {
  const id = `${prefix}-${i}`;
  const lMap = {positive:'▲ 긍정',neutral:'— 중립',negative:'▼ 부정'};
  const badge = s.type === 'etf' ? 'ETF' : '주식';
  return `<div class="stock-card" onclick="toggleChart('${id}','${s.ticker}')">
    <div class="stock-card-top">
      <div class="stock-left">
        <div class="stock-ticker">${s.ticker}</div>
        <div class="stock-type-badge">${badge}</div>
      </div>
      <div class="stock-info">
        <div class="stock-name">${s.name}</div>
        <div class="stock-reason">${s.reason}</div>
        <div class="stock-price-row">
          <div class="stock-price" id="price-${id}">—</div>
          <div class="stock-change" id="change-${id}"></div>
          <div class="stock-sentiment sentiment-${s.sentiment||'neutral'}">${lMap[s.sentiment]||'—'}</div>
        </div>
      </div>
    </div>
    <div class="chart-area" id="chart-area-${id}">
      <div class="chart-loading" id="chart-loading-${id}">📊 차트 불러오는 중…</div>
      <div class="chart-canvas-wrap" style="display:none" id="chart-canvas-wrap-${id}">
        <canvas id="chart-${id}"></canvas>
      </div>
      <div class="chart-hint-label">1년 주가 추이</div>
    </div>
  </div>`;
}

// ── 가격 조회 (Yahoo Finance via allorigins) ──
async function fetchPrice(ticker, id) {
  if (priceCache[ticker]) { applyPrice(id, priceCache[ticker]); return; }
  try {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`;
    const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
    const j = await r.json();
    const meta = JSON.parse(j.contents).chart.result[0].meta;
    const price = meta.regularMarketPrice;
    const prev  = meta.previousClose || meta.chartPreviousClose;
    const chg   = price - prev;
    const pct   = chg / prev * 100;
    const data  = {price, chg, pct};
    priceCache[ticker] = data;
    applyPrice(id, data);
  } catch {
    document.getElementById(`price-${id}`).textContent = '—';
  }
}

function applyPrice(id, {price, chg, pct}) {
  const isPos = chg >= 0;
  document.getElementById(`price-${id}`).textContent = `$${price.toFixed(2)}`;
  const chEl = document.getElementById(`change-${id}`);
  chEl.textContent = `${isPos?'+':''}${chg.toFixed(2)} (${isPos?'+':''}${pct.toFixed(2)}%)`;
  chEl.className = `stock-change ${isPos?'pos':'neg'}`;
}

// ── 차트 토글 ──
async function toggleChart(id, ticker) {
  const area = document.getElementById(`chart-area-${id}`);
  const isOpen = area.classList.contains('open');
  document.querySelectorAll('.chart-area.open').forEach(el => el.classList.remove('open'));
  if (isOpen) return;
  area.classList.add('open');
  if (chartInstances[id]) return;

  const loading = document.getElementById(`chart-loading-${id}`);
  const wrap    = document.getElementById(`chart-canvas-wrap-${id}`);
  const canvas  = document.getElementById(`chart-${id}`);

  try {
    const url = `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1wk&range=1y`;
    const r = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(url)}`);
    const j = await r.json();
    const result = JSON.parse(j.contents).chart.result[0];

    const labels = result.timestamp.map(t => {
      const d = new Date(t*1000);
      return `${d.getMonth()+1}/${d.getDate()}`;
    });
    const prices = result.indicators.quote[0].close.map(p => p ? +p.toFixed(2) : null);
    const first  = prices.find(p => p !== null);
    const last   = prices.filter(p=>p!==null).slice(-1)[0];
    const isUp   = last >= first;
    const lineClr= isUp ? '#4ade80' : '#f87171';

    loading.style.display = 'none';
    wrap.style.display = 'block';

    chartInstances[id] = new Chart(canvas, {
      type: 'line',
      data: {
        labels,
        datasets: [{
          data: prices,
          borderColor: lineClr,
          borderWidth: 2,
          pointRadius: 0,
          tension: 0.3,
          fill: true,
          backgroundColor: ctx => {
            const g = ctx.chart.ctx.createLinearGradient(0,0,0,150);
            g.addColorStop(0, isUp ? 'rgba(74,222,128,.18)' : 'rgba(248,113,113,.18)');
            g.addColorStop(1, 'rgba(0,0,0,0)');
            return g;
          }
        }]
      },
      options: {
        responsive:true, maintainAspectRatio:false,
        plugins:{
          legend:{display:false},
          tooltip:{
            callbacks:{label:c=>`$${c.parsed.y}`},
            backgroundColor:'rgba(10,10,15,.95)',
            titleColor:'#c9a84c', bodyColor:'#f5f0e8',
            borderColor:'rgba(201,168,76,.3)', borderWidth:1
          }
        },
        scales:{
          x:{ticks:{color:'#8a8070',font:{size:9},maxTicksLimit:6},grid:{color:'rgba(255,255,255,.04)'}},
          y:{ticks:{color:'#8a8070',font:{size:9},callback:v=>`$${v}`},grid:{color:'rgba(255,255,255,.04)'}}
        }
      }
    });
  } catch {
    loading.textContent = '차트 로드 실패';
  }
}

// ── 오디오 플레이어 ──
const audio = document.getElementById('audioEl');

audio.addEventListener('timeupdate', () => {
  const pct = audio.duration ? (audio.currentTime/audio.duration)*100 : 0;
  document.getElementById('progressFill').style.width = pct+'%';
  document.getElementById('progressThumb').style.left = pct+'%';
  document.getElementById('timeDisplay').textContent = `${fmt(audio.currentTime)} / ${fmt(audio.duration)}`;
  syncSubtitle();
});

function togglePlay() {
  if (audio.paused) {
    audio.play();
    document.getElementById('playIcon').innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  } else {
    audio.pause();
    document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
  }
}

function seekAudio(e) {
  const wrap = document.getElementById('progressWrap');
  const rect = wrap.getBoundingClientRect();
  const pct  = Math.max(0, Math.min(1,(e.clientX-rect.left)/rect.width));
  if (audio.duration) audio.currentTime = pct * audio.duration;
}

function cycleSpeed() {
  speedIdx = (speedIdx+1) % speeds.length;
  audio.playbackRate = speeds[speedIdx];
  document.getElementById('speedBtn').textContent = speeds[speedIdx]+'×';
}

function fmt(t) {
  if (!t||isNaN(t)) return '0:00';
  return `${Math.floor(t/60)}:${Math.floor(t%60).toString().padStart(2,'0')}`;
}

// ── 자막 싱크: 타임스탬프 기반 ──
let lastSubIdx = -1;
function syncSubtitle() {
  const subs = episodeData?.subtitles || [];
  if (!subs.length || !audio.duration) return;

  const t = audio.currentTime;
  const hasTs = subs[0]?.start !== undefined;

  let idx = 0;
  if (hasTs) {
    // 현재 시간에 해당하는 세그먼트 이진 탐색
    let lo = 0, hi = subs.length - 1;
    while (lo <= hi) {
      const mid = (lo+hi)>>1;
      if (subs[mid].start <= t) { idx = mid; lo = mid+1; }
      else hi = mid-1;
    }
    // end 시간도 체크: 세그먼트가 끝났으면 다음으로
    if (subs[idx].end && t > subs[idx].end && idx < subs.length-1) idx++;
  } else {
    idx = Math.min(Math.floor((t/audio.duration)*subs.length), subs.length-1);
  }

  if (idx === lastSubIdx) return; // 변화 없으면 스킵
  lastSubIdx = idx;

  document.querySelectorAll('.subtitle-item').forEach((el,i) => {
    el.classList.toggle('active-line', i===idx);
  });

  // 현재 자막을 부드럽게 스크롤
  const activeEl = document.getElementById(`sub-${idx}`);
  if (activeEl) activeEl.scrollIntoView({behavior:'smooth', block:'center'});
}

function seekToSub(i) {
  const subs = episodeData?.subtitles || [];
  if (!audio.duration || !subs.length) return;
  audio.currentTime = subs[i]?.start ?? (i/subs.length)*audio.duration;
  if (audio.paused) togglePlay();
}

function setLang(mode) {
  langMode = mode;
  document.getElementById('btnBoth').classList.toggle('active', mode==='both');
  document.getElementById('btnEn').classList.toggle('active',   mode==='en');
  document.getElementById('btnKo').classList.toggle('active',   mode==='ko');
  renderSubtitles();
}

function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}
