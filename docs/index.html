<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="The Journal">
<meta name="theme-color" content="#0a0a0f">
<link rel="manifest" href="manifest.json">
<title>The Journal · Daily</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{--ink:#0a0a0f;--paper:#f5f0e8;--gold:#c9a84c;--muted:#8a8070;--safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow-y:auto;-webkit-overflow-scrolling:touch;font-family:'DM Sans',sans-serif;background:var(--ink);color:var(--paper);overflow-x:hidden}

/* LOADING */
#loading{position:fixed;inset:0;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;transition:opacity .5s}
#loading.hidden{opacity:0;pointer-events:none}
.loading-logo{font-family:'Playfair Display',serif;font-size:13px;letter-spacing:6px;color:var(--gold);text-transform:uppercase;margin-bottom:28px}
.loading-bar{width:100px;height:1px;background:rgba(201,168,76,.2);position:relative;overflow:hidden}
.loading-bar::after{content:'';position:absolute;left:-100%;top:0;width:100%;height:100%;background:var(--gold);animation:lb 1.4s ease infinite}
@keyframes lb{to{left:100%}}

/* HEADER */
header{padding:calc(var(--safe-top) + 12px) 20px 12px;background:var(--ink);border-bottom:1px solid rgba(201,168,76,.2);position:sticky;top:0;z-index:50}
.header-inner{display:flex;align-items:center;justify-content:space-between;gap:12px}
.header-logo{font-family:'Playfair Display',serif;font-size:11px;letter-spacing:5px;color:var(--gold);text-transform:uppercase;flex-shrink:0}
/* 에피소드 선택 드롭다운 */
.ep-picker-wrap{flex:1;min-width:0;display:flex;justify-content:flex-end}
.ep-picker-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:6px 10px;cursor:pointer;max-width:200px;min-width:0}
.ep-picker-label{font-size:11px;color:var(--paper);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
.ep-picker-arrow{font-size:10px;color:var(--muted);flex-shrink:0}

/* 에피소드 목록 드로어 */
#epDrawer{position:fixed;inset:0;z-index:100;display:none}
#epDrawer.open{display:block}
.drawer-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.6);backdrop-filter:blur(4px)}
.drawer-panel{position:absolute;bottom:0;left:0;right:0;background:#111118;border-radius:20px 20px 0 0;padding-bottom:calc(var(--safe-bottom) + 16px);max-height:70vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.drawer-handle{width:36px;height:3px;background:rgba(255,255,255,.15);border-radius:2px;margin:12px auto 16px}
.drawer-title{font-family:'Playfair Display',serif;font-size:16px;color:var(--paper);padding:0 20px 14px;border-bottom:1px solid rgba(255,255,255,.06)}
.ep-item{display:flex;align-items:center;gap:12px;padding:14px 20px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);transition:background .15s}
.ep-item:active{background:rgba(255,255,255,.05)}
.ep-item.active-ep{background:rgba(201,168,76,.08)}
.ep-date-badge{font-family:'DM Mono',monospace;font-size:10px;color:var(--gold);background:rgba(201,168,76,.1);padding:4px 8px;border-radius:6px;flex-shrink:0;letter-spacing:1px}
.ep-item-info{flex:1;min-width:0}
.ep-item-title{font-size:13px;color:var(--paper);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.ep-item-dur{font-size:11px;color:var(--muted);margin-top:3px}
.ep-item-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);flex-shrink:0;opacity:0}
.ep-item.active-ep .ep-item-dot{opacity:1}

/* TABS */
.tabs{display:flex;background:var(--ink);border-bottom:1px solid rgba(255,255,255,.06);padding:0 20px;overflow-x:auto;scrollbar-width:none;position:sticky;top:46px;z-index:49}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{flex-shrink:0;padding:10px 16px;font-size:12px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;font-family:'DM Sans',sans-serif}
.tab-btn.active{color:var(--gold);border-bottom-color:var(--gold)}

main{min-height:calc(100dvh - 90px)}
.tab-panel{display:none}.tab-panel.active{display:block}

/* EPISODE HERO */
.episode-hero{padding:20px 20px 16px;background:linear-gradient(180deg,rgba(201,168,76,.06) 0%,transparent 100%);border-bottom:1px solid rgba(255,255,255,.06)}
.episode-date{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:7px}
.episode-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;line-height:1.3;color:var(--paper);margin-bottom:10px}
.episode-meta{display:flex;gap:12px;font-size:12px;color:var(--muted)}

/* PLAYER */
.player-wrap{margin:14px 20px;background:rgba(255,255,255,.04);border:1px solid rgba(201,168,76,.2);border-radius:16px;padding:16px}
.player-controls{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.play-btn{width:48px;height:48px;border-radius:50%;background:var(--gold);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 4px 20px rgba(201,168,76,.3)}
.play-btn:active{transform:scale(.94)}
.play-icon{width:20px;height:20px;fill:var(--ink)}
.player-info{flex:1;min-width:0}
.player-time{font-family:'DM Mono',monospace;font-size:13px;color:var(--paper);margin-bottom:4px}
.speed-btn{background:rgba(255,255,255,.08);border:none;color:var(--paper);font-family:'DM Mono',monospace;font-size:11px;padding:3px 9px;border-radius:20px;cursor:pointer}
.progress-wrap{position:relative;cursor:pointer;padding:8px 0}
.progress-bg{height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--gold);border-radius:2px;width:0%;transition:width .25s linear}
.progress-thumb{position:absolute;top:50%;width:12px;height:12px;background:var(--gold);border-radius:50%;transform:translate(-50%,-50%);left:0%;transition:left .25s linear;box-shadow:0 0 8px rgba(201,168,76,.6)}

/* SUBTITLES */
.subtitle-container{padding:0 20px 24px}
.subtitle-header{display:flex;align-items:center;justify-content:space-between;padding:12px 0 10px}
.subtitle-label{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);display:flex;align-items:center;gap:8px}
.ad-badge{font-size:9px;background:rgba(248,113,113,.15);color:#f87171;padding:2px 6px;border-radius:4px;letter-spacing:1px;display:none}
.lang-toggle{display:flex;gap:4px}
.lang-btn{padding:4px 10px;border-radius:20px;border:1px solid rgba(255,255,255,.15);background:none;color:var(--muted);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif}
.lang-btn.active{background:var(--gold);border-color:var(--gold);color:var(--ink);font-weight:600}
.subtitle-list{display:flex;flex-direction:column;gap:2px}
.subtitle-item{padding:12px 14px;border-radius:10px;cursor:pointer;border-left:3px solid transparent;transition:background .15s}
.subtitle-item.active-line{background:rgba(201,168,76,.12);border-left-color:var(--gold)}
.subtitle-item:not(.active-line):nth-child(even){background:rgba(255,255,255,.02)}
.sub-en{font-size:15px;line-height:1.6;color:var(--paper);margin-bottom:4px}
.sub-ko{font-size:13px;line-height:1.6;color:rgba(245,240,232,.55);font-weight:300}
.subtitle-item.ko-only .sub-en{display:none}
.subtitle-item.ko-only .sub-ko{color:var(--paper);font-size:15px}
.subtitle-item.en-only .sub-ko{display:none}

/* SUMMARY */
.summary-wrap{padding:22px 20px}
.section-eyebrow{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.summary-text{font-size:15px;line-height:1.8;color:rgba(245,240,232,.85);font-weight:300;margin-bottom:22px}
.key-points{display:flex;flex-direction:column;gap:10px;margin-bottom:30px}
.key-point{display:flex;gap:12px;align-items:flex-start;padding:13px;background:rgba(255,255,255,.03);border-radius:10px;border:1px solid rgba(255,255,255,.06)}
.key-num{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--gold);opacity:.6;line-height:1;flex-shrink:0;min-width:18px}
.key-text{font-size:14px;line-height:1.6;color:var(--paper)}

/* STOCKS */
.stocks-wrap{padding:22px 20px}
.stocks-section-title{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.stocks-hint{font-size:10px;color:var(--muted);letter-spacing:.5px}
.stock-list{display:flex;flex-direction:column;gap:10px;margin-bottom:22px}
.stock-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:14px;overflow:hidden;cursor:pointer;transition:border-color .2s}
.stock-card:active{background:rgba(255,255,255,.05)}
.stock-card-top{display:flex;align-items:flex-start;gap:12px;padding:14px}
.stock-left{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0}
.stock-ticker{background:var(--gold);color:var(--ink);font-family:'DM Mono',monospace;font-size:12px;font-weight:500;padding:5px 10px;border-radius:7px;letter-spacing:1px;min-width:52px;text-align:center}
.stock-type-badge{font-size:9px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);background:rgba(255,255,255,.06);padding:2px 6px;border-radius:4px}
.stock-info{flex:1;min-width:0}
.stock-name{font-size:13px;font-weight:500;color:var(--paper);margin-bottom:3px}
.stock-reason{font-size:12px;color:var(--muted);line-height:1.5;margin-bottom:7px}
.stock-price-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.stock-price{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--paper)}
.stock-change{font-size:12px;font-weight:600}
.pos{color:#4ade80}.neg{color:#f87171}.neu{color:var(--muted)}
.stock-sentiment{font-size:11px;font-weight:600}
.sentiment-positive{color:#4ade80}.sentiment-neutral{color:var(--muted)}.sentiment-negative{color:#f87171}
.chart-area{padding:0 14px 14px;display:none}
.chart-area.open{display:block}
.chart-canvas-wrap{position:relative;height:150px;display:none}
.chart-loading{font-size:12px;color:var(--muted);text-align:center;padding:18px 0}
.chart-hint-label{font-size:10px;color:var(--muted);text-align:right;margin-top:4px;letter-spacing:.5px}
.market-outlook{background:rgba(201,168,76,.08);border:1px solid rgba(201,168,76,.2);border-radius:14px;padding:16px;margin-bottom:18px}
.outlook-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.outlook-text{font-size:14px;line-height:1.7;color:rgba(245,240,232,.8)}
.disclaimer{padding:13px 15px;background:rgba(255,255,255,.02);border-radius:10px;font-size:11px;color:var(--muted);line-height:1.6;border:1px solid rgba(255,255,255,.05);margin-bottom:16px}
.donate-btn{display:flex;align-items:center;justify-content:center;gap:8px;background:#FFDD00;color:#000;font-size:14px;font-weight:700;padding:14px;border-radius:12px;text-decoration:none;margin-bottom:40px;letter-spacing:.3px}

.referral-btn:active{opacity:.85}
.referral-inner{display:flex;align-items:center;gap:14px;padding:16px}
.referral-icon{font-size:28px;flex-shrink:0}
.referral-text{flex:1}
.referral-title{font-size:14px;font-weight:700;color:#fff;margin-bottom:3px}
.referral-desc{font-size:12px;color:rgba(255,255,255,.8)}
.bottom-safe{height:calc(var(--safe-bottom)+24px)}

<script>
let episodeData = null;
let episodeIndex = [];
let currentDate = null;
let langMode = 'both';
const speeds = [0.75,1.0,1.25,1.5,2.0];
let speedIdx = 1;
const chartInstances = {};
const priceCache = {};
let lastSubIdx = -1;

// ── 초기 로드 ──
async function init() {
  // 에피소드 목록 로드
  try {
    const r = await fetch('index_list.json?t='+Date.now());
    if (r.ok) episodeIndex = await r.json();
  } catch {}

  // 오늘 에피소드 로드
  await loadEpisode('today.json', null);
  setTimeout(() => document.getElementById('loading').classList.add('hidden'), 500);
}

async function loadEpisode(url, date) {
  try {
    const r = await fetch(url + '?t=' + Date.now());
    if (!r.ok) throw new Error();
    episodeData = await r.json();
    currentDate = date || episodeData.date || 'today';
  } catch {
    episodeData = getDemoData();
    currentDate = 'demo';
  }
  // 오디오 정지
  const a = document.getElementById('audioEl');
  a.pause(); a.src = '';
  document.getElementById('playIcon').innerHTML = '<path d="M8 5v14l11-7z"/>';
  // 차트 초기화
  Object.keys(chartInstances).forEach(k => { chartInstances[k].destroy(); delete chartInstances[k]; });
  lastSubIdx = -1;
  renderAll();
}

// ── 드로어 ──
async function openDrawer() {
  if (!episodeIndex.length) {
    try {
      const r = await fetch('index_list.json?t='+Date.now());
      if (r.ok) episodeIndex = await r.json();
    } catch {}
  }
  renderEpList();
  document.getElementById('epDrawer').classList.add('open');
}
function closeDrawer() { document.getElementById('epDrawer').classList.remove('open'); }

function renderEpList() {
  const list = document.getElementById('epList');
  if (!episodeIndex.length) {
    list.innerHTML = '<div style="padding:24px 20px;color:var(--muted);font-size:13px">저장된 에피소드가 없습니다.<br>Actions를 실행하면 목록이 쌓입니다.</div>';
    return;
  }
  list.innerHTML = episodeIndex.map(ep => {
    const isActive = ep.date === currentDate;
    const d = new Date(ep.date);
    const label = `${d.getMonth()+1}/${d.getDate()}`;
    return `<div class="ep-item ${isActive?'active-ep':''}" onclick="selectEpisode('${ep.date}','${ep.file}')">
      <div class="ep-date-badge">${label}</div>
      <div class="ep-item-info">
        <div class="ep-item-title">${ep.title}</div>
        <div class="ep-item-dur">${ep.duration||''}</div>
      </div>
      <div class="ep-item-dot"></div>
    </div>`;
  }).join('');
}

async function selectEpisode(date, file) {
  closeDrawer();
  document.getElementById('loading').classList.remove('hidden');
  await loadEpisode(file, date);
  setTimeout(() => document.getElementById('loading').classList.add('hidden'), 400);
}

// ── 렌더링 ──
function renderAll() {
  const ep = episodeData;

  // 날짜 피커 라벨
  if (currentDate && currentDate !== 'today' && currentDate !== 'demo') {
    const d = new Date(currentDate);
    document.getElementById('pickerLabel').textContent =
      `${d.getMonth()+1}월 ${d.getDate()}일`;
  } else {
    document.getElementById('pickerLabel').textContent = '오늘';
  }

  document.getElementById('epDate').textContent   = ep.published || '';
  document.getElementById('epTitle').textContent  = ep.title || '';
  document.getElementById('epDuration').textContent = ep.duration || '';

  if (ep.audio_url) document.getElementById('audioEl').src = ep.audio_url;

  if (ep.ad_segments_removed > 0) {
    const b = document.getElementById('adBadge');
    b.style.display = 'inline';
    b.textContent = `광고 ${ep.ad_segments_removed}구간 제거`;
  } else {
    document.getElementById('adBadge').style.display = 'none';
  }

  renderSubtitles();
  document.getElementById('summaryText').textContent = ep.analysis?.summary_ko || '—';
  document.getElementById('keyPoints').innerHTML = (ep.analysis?.key_points||[]).map((p,i)=>
    `<div class="key-point"><div class="key-num">${i+1}</div><div class="key-text">${p}</div></div>`
  ).join('');
  renderStocks();
}

function renderSubtitles() {
  const subs = episodeData?.subtitles || [];
  const list = document.getElementById('subtitleList');
  if (!subs.length) { list.innerHTML='<div style="padding:30px;text-align:center;color:var(--muted)">자막 없음</div>'; return; }
  list.innerHTML = subs.map((s,i)=>{
    let cls='subtitle-item';
    if(langMode==='ko') cls+=' ko-only';
    if(langMode==='en') cls+=' en-only';
    return `<div class="${cls}" id="sub-${i}" onclick="seekToSub(${i})">
      <div class="sub-en">${s.en||''}</div>
      <div class="sub-ko">${s.ko||''}</div>
    </div>`;
  }).join('');
}

function renderStocks() {
  const all    = episodeData?.analysis?.related_stocks || [];
  const stocks = all.filter(s=>s.type!=='etf');
  const etfs   = all.filter(s=>s.type==='etf');
  document.getElementById('stockList').innerHTML = stocks.map((s,i)=>stockHTML(s,'stk',i)).join('') ||
    '<div style="color:var(--muted);font-size:13px;padding:8px">관련 주식 없음</div>';
  document.getElementById('etfList').innerHTML = etfs.map((s,i)=>stockHTML(s,'etf',i)).join('') ||
    '<div style="color:var(--muted);font-size:13px;padding:8px">관련 ETF 없음</div>';
  stocks.forEach((s,i)=>fetchPrice(s.ticker,`stk-${i}`));
  etfs.forEach((s,i)=>fetchPrice(s.ticker,`etf-${i}`));
  if (episodeData?.analysis?.market_outlook) {
    document.getElementById('outlookText').textContent = episodeData.analysis.market_outlook;
    document.getElementById('marketOutlook').style.display='block';
  } else {
    document.getElementById('marketOutlook').style.display='none';
  }
}

function stockHTML(s,prefix,i) {
  const id=`${prefix}-${i}`;
  const lMap={positive:'▲ 긍정',neutral:'— 중립',negative:'▼ 부정'};
  return `<div class="stock-card" onclick="toggleChart('${id}','${s.ticker}')">
    <div class="stock-card-top">
      <div class="stock-left">
        <div class="stock-ticker">${s.ticker}</div>
        <div class="stock-type-badge">${s.type==='etf'?'ETF':'주식'}</div>
      </div>
      <div class="stock-info">
        <div class="stock-name">${s.name}</div>
        <div class="stock-reason">${s.reason}</div>
        <div class="stock-price-row">
          <div class="stock-price" id="price-${id}">—</div>
          <div class="stock-change" id="change-${id}"></div>
          <div class="stock-sentiment sentiment-${s.sentiment||'neutral'}">${lMap[s.sentiment]||'—'}</div>
        </div>
      </div>
    </div>
    <div class="chart-area" id="chart-area-${id}">
      <div class="chart-loading" id="chart-loading-${id}">📊 차트 불러오는 중…</div>
      <div class="chart-canvas-wrap" id="chart-canvas-wrap-${id}">
        <canvas id="chart-${id}"></canvas>
      </div>
      <div class="chart-hint-label">1년 주가 추이</div>
    </div>
  </div>`;
}

// ── 가격/차트 fetch (프록시 폴백 체인) ──
const PROXIES = [
  url => `https://corsproxy.io/?${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
  url => `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
];

async function yahooFetch(yahooUrl) {
  for (const proxy of PROXIES) {
    try {
      const r = await fetch(proxy(yahooUrl), { signal: AbortSignal.timeout(6000) });
      if (!r.ok) continue;
      const j = await r.json();
      // allorigins는 j.contents 에 문자열로 감싸서 옴
      const raw = typeof j === 'string' ? j : (j.contents ?? JSON.stringify(j));
      return JSON.parse(raw);
    } catch { continue; }
  }
  throw new Error('모든 프록시 실패');
}

async function fetchPrice(ticker, id) {
  if (priceCache[ticker]) { applyPrice(id, priceCache[ticker]); return; }
  try {
    const data = await yahooFetch(
      `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1d&range=1d`
    );
    const meta  = data.chart.result[0].meta;
    const price = meta.regularMarketPrice;
    const prev  = meta.previousClose || meta.chartPreviousClose;
    const chg   = price - prev;
    const pct   = chg / prev * 100;
    priceCache[ticker] = { price, chg, pct };
    applyPrice(id, priceCache[ticker]);
  } catch {
    document.getElementById(`price-${id}`).textContent = '—';
  }
}

function applyPrice(id, { price, chg, pct }) {
  const isPos = chg >= 0;
  document.getElementById(`price-${id}`).textContent = `$${price.toFixed(2)}`;
  const el = document.getElementById(`change-${id}`);
  el.textContent = `${isPos?'+':''}${chg.toFixed(2)} (${isPos?'+':''}${pct.toFixed(2)}%)`;
  el.className = `stock-change ${isPos ? 'pos' : 'neg'}`;
}

async function toggleChart(id, ticker) {
  const area = document.getElementById(`chart-area-${id}`);
  const isOpen = area.classList.contains('open');
  document.querySelectorAll('.chart-area.open').forEach(el => el.classList.remove('open'));
  if (isOpen) return;
  area.classList.add('open');
  if (chartInstances[id]) return;

  const loading = document.getElementById(`chart-loading-${id}`);
  const wrap    = document.getElementById(`chart-canvas-wrap-${id}`);
  const canvas  = document.getElementById(`chart-${id}`);

  try {
    const data   = await yahooFetch(
      `https://query1.finance.yahoo.com/v8/finance/chart/${ticker}?interval=1wk&range=1y`
    );
    const result = data.chart.result[0];
    const labels = result.timestamp.map(t => {
      const d = new Date(t * 1000);
      return `${d.getMonth()+1}/${d.getDate()}`;
    });
    const prices = result.indicators.quote[0].close.map(p => p ? +p.toFixed(2) : null);
    const first  = prices.find(p => p !== null);
    const last   = prices.filter(p => p !== null).slice(-1)[0];
    const isUp   = last >= first;
    const lc     = isUp ? '#4ade80' : '#f87171';

    loading.style.display = 'none';
    wrap.style.display = 'block';

    chartInstances[id] = new Chart(canvas, {
      type: 'line',
      data: { labels, datasets: [{ data: prices, borderColor: lc, borderWidth: 2,
        pointRadius: 0, tension: 0.3, fill: true,
        backgroundColor: ctx => {
          const g = ctx.chart.ctx.createLinearGradient(0, 0, 0, 150);
          g.addColorStop(0, isUp ? 'rgba(74,222,128,.18)' : 'rgba(248,113,113,.18)');
          g.addColorStop(1, 'rgba(0,0,0,0)'); return g;
        }
      }]},
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: {
          callbacks: { label: c => `$${c.parsed.y}` },
          backgroundColor: 'rgba(10,10,15,.95)', titleColor: '#c9a84c',
          bodyColor: '#f5f0e8', borderColor: 'rgba(201,168,76,.3)', borderWidth: 1
        }},
        scales: {
          x: { ticks: { color:'#8a8070', font:{size:9}, maxTicksLimit:6 }, grid: { color:'rgba(255,255,255,.04)' }},
          y: { ticks: { color:'#8a8070', font:{size:9}, callback: v=>`$${v}` }, grid: { color:'rgba(255,255,255,.04)' }}
        }
      }
    });
  } catch {
    loading.textContent = '차트 로드 실패 — 잠시 후 다시 탭해보세요';
  }
}

// ── 오디오 ──
const audio=document.getElementById('audioEl');
audio.addEventListener('timeupdate',()=>{
  const pct=audio.duration?(audio.currentTime/audio.duration)*100:0;
  document.getElementById('progressFill').style.width=pct+'%';
  document.getElementById('progressThumb').style.left=pct+'%';
  document.getElementById('timeDisplay').textContent=`${fmt(audio.currentTime)} / ${fmt(audio.duration)}`;
  syncSubtitle();
});
function togglePlay(){
  if(audio.paused){audio.play();document.getElementById('playIcon').innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';}
  else{audio.pause();document.getElementById('playIcon').innerHTML='<path d="M8 5v14l11-7z"/>';}
}
function seekAudio(e){
  const wrap=document.getElementById('progressWrap'),rect=wrap.getBoundingClientRect();
  const pct=Math.max(0,Math.min(1,(e.clientX-rect.left)/rect.width));
  if(audio.duration) audio.currentTime=pct*audio.duration;
}
function cycleSpeed(){
  speedIdx=(speedIdx+1)%speeds.length;
  audio.playbackRate=speeds[speedIdx];
  document.getElementById('speedBtn').textContent=speeds[speedIdx]+'×';
}
function fmt(t){if(!t||isNaN(t))return'0:00';return`${Math.floor(t/60)}:${Math.floor(t%60).toString().padStart(2,'0')}`;}

// ── 자막 싱크 (타임스탬프 이진탐색) ──
function syncSubtitle(){
  const subs=episodeData?.subtitles||[];
  if(!subs.length||!audio.duration) return;
  const t=audio.currentTime;
  const hasTs=subs[0]?.start!==undefined;
  let idx=0;
  if(hasTs){
    let lo=0,hi=subs.length-1;
    while(lo<=hi){const mid=(lo+hi)>>1;if(subs[mid].start<=t){idx=mid;lo=mid+1;}else hi=mid-1;}
    if(subs[idx].end&&t>subs[idx].end&&idx<subs.length-1) idx++;
  } else {
    idx=Math.min(Math.floor((t/audio.duration)*subs.length),subs.length-1);
  }
  if(idx===lastSubIdx) return;
  lastSubIdx=idx;
  document.querySelectorAll('.subtitle-item').forEach((el,i)=>el.classList.toggle('active-line',i===idx));
  document.getElementById(`sub-${idx}`)?.scrollIntoView({behavior:'smooth',block:'center'});
}
function seekToSub(i){
  const subs=episodeData?.subtitles||[];
  if(!audio.duration||!subs.length) return;
  audio.currentTime=subs[i]?.start??(i/subs.length)*audio.duration;
  if(audio.paused) togglePlay();
}
function setLang(mode){
  langMode=mode;
  document.getElementById('btnBoth').classList.toggle('active',mode==='both');
  document.getElementById('btnEn').classList.toggle('active',mode==='en');
  document.getElementById('btnKo').classList.toggle('active',mode==='ko');
  renderSubtitles();
}
function switchTab(name,btn){
  document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
  btn.classList.add('active');
}
