name: WSJ Daily Data Generator

on:
  schedule:
    # WSJ 에피소드는 ET 오후 4시 발행
    # ET 오후 5시 (= 한국 시간 다음날 오전 6시 EDT) 에 실행
    # ET 17:00 EDT = UTC 21:00
    - cron: "0 21 * * 1-5"  # 월~금 (ET 기준)
  workflow_dispatch:
    inputs:
      target_date:
        description: '처리할 날짜 (YYYY-MM-DD, ET 기준). 비워두면 ET 오늘'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ffmpeg 설치
        run: sudo apt-get install -y ffmpeg

      - name: Python 패키지 설치
        run: pip install openai-whisper anthropic feedparser requests

      - name: 에피소드 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TARGET_DATE: ${{ github.event.inputs.target_date }}
          TZ: America/New_York
        run: python generate.py ${{ github.event.inputs.target_date }}

      - name: GitHub Pages 배포
        run: |
          git config user.name "wsj-bot"
          git config user.email "bot@github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "📰 Episode: ${{ github.event.inputs.target_date || 'today' }}"
          git push
