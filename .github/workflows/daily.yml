name: WSJ Daily Data Generator

on:
  schedule:
    # 뉴욕 섬머타임(EDT) 06:20 = UTC 10:20
    - cron: "20 10 * * 1-5"  # 월~금
  workflow_dispatch:
    inputs:
      target_date:
        description: '처리할 날짜 (YYYY-MM-DD). 비워두면 오늘 날짜로 실행'
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ffmpeg 설치
        run: sudo apt-get install -y ffmpeg

      - name: Python 패키지 설치
        run: pip install openai-whisper anthropic feedparser requests

      - name: today.json 생성
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TARGET_DATE: ${{ github.event.inputs.target_date }}
        run: python generate.py ${{ github.event.inputs.target_date }}

      - name: GitHub Pages에 배포
        run: |
          git config user.name "wsj-bot"
          git config user.email "bot@github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "📰 Episode update: ${{ github.event.inputs.target_date || 'today' }}"
          git push
